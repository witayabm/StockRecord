services:
  stock-record:
    build:
      context: .
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      FRONTEND_PORT: 3000
      BACKEND_PORT: 3001
      API_BASE_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:3000
    restart: unless-stopped
